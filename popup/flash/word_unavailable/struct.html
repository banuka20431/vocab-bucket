<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Unavailable</title>
    <link rel="stylesheet" href="../../styles/shared.css" />
    <link rel="stylesheet" href="../../main.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <h2 class="title">Exact word is unavailable</h2>
        <div class="word-item">
          <span class="word"></span>
          <p class="definition"></p>
        </div>
        <div class="flash-actions">
          <button class="control info" id="close-btn">Close</button>
          <button class="control info" id="save-btn">Save</button>
          <button class="control info" id="recheck-def-btn">Recheck def</button>
        </div>
      </header>
    </div>
    <script type="module" src="script.js" defer></script>
  </body>
</html>
